<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lion Cartoon Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f3f3f3;
        }

        .container {
            width: 900px;
            height: 500px;
            background: white;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .menu-left,
        .menu-right {
            position: absolute;
            width: 250px;
        }

        .menu-left {
            left: 40px;
            top: 100px;
        }

        .menu-right {
            right: 40px;
            top: 100px;
        }

        .item {
            width: 220px;
            height: 45px;
            border-radius: 30px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            padding-left: 25px;
            font-weight: bold;
            color: #333;
            font-size: 18px;
            animation: slide 2s infinite alternate;
        }

        .yellow {
            background: #f7e27d;
        }

        .blue {
            background: #b9edf5;
        }

        .pink {
            background: #f7d4ef;
        }

        .lion {
            position: absolute;
            width: 320px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            animation: jump 2s infinite;
        }

        .heart {
            position: absolute;
            top: 30px;
            right: 300px;
            width: 60px;
            height: 60px;
            background: #ff4d4d;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
            animation: pulse 1s infinite;
        }

        @keyframes jump {
            0% {
                transform: translate(-50%, -50%) translateY(0);
            }

            50% {
                transform: translate(-50%, -50%) translateY(-15px);
            }

            100% {
                transform: translate(-50%, -50%) translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes slide {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(10px);
            }
        }

        @media(max-width:900px) {
            .container {
                width: 95%;
                height: auto;
                padding: 30px 0 80px;
            }

            .lion {
                position: relative;
                width: 220px;
                left: 50%;
                top: 0;
                transform: translateX(-50%);
                margin-top: 30px;
            }

            .menu-left,
            .menu-right {
                position: relative;
                width: 100%;
                left: 0;
                right: 0;
                top: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .heart {
                right: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="heart">❤</div>

        <div class="menu-left">
            <div class="item yellow">ABOUT</div>
            <div class="item blue">ADMISSION</div>
            <div class="item pink">WORK GALLERY</div>
            <div class="item yellow">BANNERS</div>
            <div class="item blue">POSTER</div>
        </div>

        <img class="lion"
            src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
            alt="lion">

        <div class="menu-right">
            <div class="item pink">COMICS</div>
            <div class="item yellow">VIDEOS</div>
            <div class="item blue">MOTION GRAPHICS</div>
            <div class="item pink">DIGITAL ARTS</div>
        </div>

    </div>

</body>

</html>
