    document.getElementById('category').innerHTML =

    function filtercategory(cat) {
        let filteredProducts = productname.filter(
            item => (item.category === cat)
        );
        document.getElementById('seconddiv').innerHTML =
            filteredProducts.map(i =>
                `<button onclick="filtername('${i.name}')">${i.name}</button>`
            ).join("");
        document.getElementById('thirddiv').innerHTML = "";

      }
function filterName(productName) {

  let product = productdetails.find(
    p => p.name.toLowerCase() === productName.toLowerCase()
  );

  document.getElementById('thirddiv').innerHTML = `
    <img src="${product.url}" width="150"><br><br>
    <b>Name:</b> ${product.name}<br>
    <b>Type:</b> ${product.types || product.type}<br>
    <b>Quality:</b> ${product.quality}<br>
    <b>Price:</b> ${product.price}<br>
    <b>Brand:</b> ${product.brand || "N/A"}
  `;
}
