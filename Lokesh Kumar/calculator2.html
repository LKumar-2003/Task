<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #calculate2 {
            border: 2px solid black;
            width: 30%;
            height: 20vh;
            background-color: cornflowerblue;
            margin: 25%;
            padding: 10%;

        }
    </style>
</head>

<body>
    <div id="calculate2">
        <label for="">Frist No. :</label>
        <input type="text" placeholder="First Number" id="no1"><br><br>
        <label for="">Second No. :</label>
        <input type="text" placeholder="Second Number" id="no2"><br><br>
        <label for="">Result:</label>
        <input type="text" placeholder="result" id="result"><br><br>
        <button onclick="calculator('+')">Addition(+)</button>
        <button onclick="calculator('-')">Subtraction(-)</button>
        <button onclick="calculator('*')">Multiplication(*)</button>
        <button onclick="calculator('/')">Division(/)</button>


    </div>
</body>
<script>
    function calculator(op) {
        let a = Number(document.getElementById('no1').value)
        let b = Number(document.getElementById('no2').value)
        if (op === "+") {
            document.getElementById('result').value = (a + b)
        }
        else if (op == "-") {
            document.getElementById('result').value = (a - b)
        }
        else if (op == "*") {
            document.getElementById('result').value = (a * b)
        }
        else if (op == "/") {
            document.getElementById('result').value = (a / b)
        }

    }
</script>

</html>
