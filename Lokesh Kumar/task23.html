<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #maindiv{
            margin-top: 10%;
            margin-left: 30%;
            border: 2px solid black;
            width: 40%;
            height: 40vh;
            text-align: center;
            padding-top: 5%;
            background-color: brown;
        }
        #result{
            width: 60%;
        }
    </style>
</head>
<body>
    <div id="maindiv">
    <label for="" >Name:</label>
    <input type="text" placeholder="Name" id="name" ><br><br>
    <label for="">Age:</label>
    <input type="number" placeholder="age" id="age"><br><br>



    <button onclick="agecalculate()" >calculate</button><br><br>
     <label for="">Result:</label>
     <input type="text" placeholder="Result" id="result">


    </div>
    
</body>
<script>
    function agecalculate(){
        let name= (document.getElementById('name').value)
        let age= (document.getElementById('age').value)
        if(age>=18) {
         document.getElementById('result').value= name + " you can vote"

        }
        else if(age==17) {
            document.getElementById('result').value=name + "you have to Wait for 1 more year"
        }
        else if (age==16) {
            document.getElementById('result').value= name +"you have to Wait for 2 more year" 
        }
        else{
            alert("you can not vote")
        }
    }


</script>
</html>
