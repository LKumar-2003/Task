<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #maindiv{
            border: 2px solid black;
            width: 100%;
            height: 100vh;
            display: flex;
            gap: 25%;
            padding-top: 10%;

        }
        #Registerdiv{
            margin-left: 10%;
            border: 2px solid black;
            width: 30%;
            height: 65vh;
            text-align: center;
            border-radius: 10%;
            background-color: aqua;

        }
        .id_Idcard{
             border: 2px solid black;
            width: 30%;
            height: 65vh;
            text-align: center;
            border-radius: 10%;
            background-color: aqua;
        }
     #showphoto{
        width: 50px;
        height: 50px;
        border-radius: 50%;

     }
        
    </style>
</head>
<body>
<div id="maindiv">
    <div id="Registerdiv">
        <h1>Register</h1>
    <label for="">Name:</label>
    <input type="text" placeholder="name" id="name"><br><br>
    <label for="">Email:</label>
    <input type="text" placeholder="email" id="email"><br><br>
    <label for="">Number:</label>
    <input type="text" placeholder="number" id="number" ><br><br>
    <label for="">Blood Group:</label>
    <input type="text" placeholder="group" id="blood"><br><br>
    <label for="">Position:</label>
    <input type="text" placeholder="Position" id="position"><br><br>
    <input type="url" id="photo"><br><br>
    <button onclick="submit()">Submit</button>
    </div>
     <div class="id_Idcard">
     <h2>ID CARD</h2>
     <img src="" alt="" id="showphoto">
     <p id="showname"></p>
     <p id="shownumber"></p>
     <p id="showemail"></p>
     <p id="showblood"></p>
     <p id="showposition"></p>
     </div>
     </div>
    </body>
<script>
    function submit(){
        
    let name= document.getElementById('name').value
    let number= document.getElementById('number').value
    let email= document.getElementById('email').value
    let blood= document.getElementById('blood').value
    let position= document.getElementById('position').value
    let photo= document.getElementById('photo').value

    
    document.getElementById('showname').innerHTML="NAME:  " + name
    document.getElementById('shownumber').innerHTML="Number:  " + number
    document.getElementById('showemail').innerHTML="Email:  " + email
    document.getElementById('showblood').innerHTML="Blood Group:  " + blood
    document.getElementById('showposition').innerHTML="Position:  " + position
    document.getElementById('showphoto').src=photo
    }
</script>

</html>
