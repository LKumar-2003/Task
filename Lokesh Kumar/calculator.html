<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f5f5;
        }

        .contact-section {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .contact-box {
            background: white;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .contact-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .input-group textarea {
            resize: none;
            height: 120px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            background: #000;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #333;
        }
    </style>
</head>

<body>

    <section class="contact-section">
        <div class="contact-box">
            <h2>Contact Me</h2>

            <form>
                <div class="input-group">
                    <input type="text" placeholder="Your Name" required>
                </div>

                <div class="input-group">
                    <input type="email" placeholder="Your Email" required>
                </div>

                <div class="input-group">
                    <textarea placeholder="Your Message" required></textarea>
                </div>

                <button type="submit">Send Message</button>
            </form>
        </div>
    </section>

</body>

</html>
