<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>

  <link rel="stylesheet" href="Login.css">
</head>

<body>

  <form class="form" onsubmit="login(event)">

    <span class="input-span">
      <label class="label">Email</label>

      <input type="email" id="userEmail" required>
    </span>

    <span class="input-span">
      <label class="label">Password</label>

      <input type="password" id="userPassword" required>
    </span>

    <input class="submit" type="submit" value="Log in">
    

  </form>

  <script>

    // localStorage me saved data
    let Gmail = localStorage.getItem('userEmail');
    let Password = localStorage.getItem('userPass');

    function login(event) {
      event.preventDefault();

      let Gmail = localStorage.getItem('userEmail');
      let Password = localStorage.getItem('userPass');



      let Email = document.getElementById('userEmail').value;
      let Epassword = document.getElementById('userPassword').value;

      if (Gmail == Email && Password == Epassword) {
            window.location.href = "Localstorage.html";
        alert("Login Successful");

      } else {

        alert("Incorrect Email or Password");
        
      }
    }

  </script>

</body>

</html>
