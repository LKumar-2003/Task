<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Hero Animation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#020617;
    overflow:hidden;
}

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    color:white;
    text-align:center;
    padding:20px;
}

.content{
    z-index:10;
    max-width:700px;
    animation:fadeUp 1.2s ease forwards;
}

.content h1{
    font-size:65px;
    line-height:1.2;
    margin-bottom:20px;
}

.content h1 span{
    color:#38bdf8;
}

.content p{
    font-size:18px;
    color:#cbd5e1;
    margin-bottom:30px;
}

.btn{
    padding:15px 35px;
    border:none;
    border-radius:40px;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px #38bdf8;
}

/* Animated Background Blobs */
.blob{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    opacity:.6;
    animation:float 8s infinite ease-in-out;
}

.blob1{
    width:300px;
    height:300px;
    background:#3b82f6;
    top:10%;
    left:10%;
}

.blob2{
    width:250px;
    height:250px;
    background:#8b5cf6;
    bottom:10%;
    right:10%;
    animation-delay:2s;
}

.blob3{
    width:200px;
    height:200px;
    background:#06b6d4;
    top:50%;
    left:50%;
    animation-delay:4s;
}

/* Glass Card */
.glass{
    position:absolute;
    width:320px;
    height:200px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    border-radius:20px;
    top:15%;
    right:8%;
    animation:float 5s infinite ease-in-out;
}

/* Animations */
@keyframes float{
    0%,100%{transform:translateY(0) translateX(0);}
    50%{transform:translateY(-30px) translateX(20px);}
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){
    .content h1{
        font-size:42px;
    }

    .glass{
        display:none;
    }
}
</style>
</head>
<body>

<section class="hero">

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="glass"></div>

    <div class="content">
        <h1>Create <span>Modern</span><br>Hero Animations</h1>
        <p>Build premium landing pages with glowing animated backgrounds and smooth UI effects.</p>
        <button class="btn">Get Started</button>
    </div>

</section>

</body>
</html>
